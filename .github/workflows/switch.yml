name: Switch build

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-switch:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, 'ci skip')
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    strategy:
      fail-fast: false
      matrix:
        mode:
          - debug
#          - release
        variant:
          - homebrew
          - sysmodule

    steps:
      - name: Get current date as cache key
        id: cache_key
        run: echo "key=$(date +'%W')" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        shell: bash
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get -y install gcc g++ zip
          else
            apt-get update
            apt-get -y install gcc g++ zip
          fi

      - name: Set xmake env
        run: echo "XMAKE_GLOBALDIR=${{ runner.workspace }}/xmake-global" >> "$GITHUB_ENV"

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: branch@dev
          actions-cache-folder: .xmake-cache-W${{ steps.cache_key.outputs.key }}

      - name: Update xmake repository
        shell: bash
        run: |
          xmake repo --update --root
          xmake repo -u --root

      - name: Configure xmake
        shell: bash
        run: |
          if [ "${{ matrix.variant }}" = "homebrew" ]; then
            xmake f --yes -p cross -m "${{ matrix.mode }}" -a aarch64 --toolchain=devkita64 --homebrew=y -vD --root
          else
            xmake f --yes -p cross -m "${{ matrix.mode }}" -a aarch64 --toolchain=devkita64 -vD --root
          fi

      - name: Build SwitchU
        run: xmake -vD --root

      - name: Package install layout
        run: xmake install -o "dist/${{ matrix.variant }}/${{ matrix.mode }}" --root

      - name: Create sysmodule zip
        if: matrix.variant == 'sysmodule'
        shell: bash
        run: |
          repo_root="$PWD"
          package_root="dist/sysmodule/${{ matrix.mode }}"
          archive_path="$repo_root/artifacts/SwitchU-sysmodule-${{ matrix.mode }}.zip"

          test -d "$package_root/atmosphere"
          test -d "$package_root/switch"

          mkdir -p "$repo_root/artifacts"
          cd "$package_root"
          zip -r "$archive_path" atmosphere switch

      - name: Upload homebrew artifact
        if: matrix.variant == 'homebrew'
        uses: actions/upload-artifact@v4
        with:
          name: SwitchU-homebrew-${{ matrix.mode }}
          if-no-files-found: error
          path: |
            build/cross/aarch64/${{ matrix.mode }}/SwitchU.nro
            dist/homebrew/${{ matrix.mode }}/

      - name: Upload sysmodule artifact
        if: matrix.variant == 'sysmodule'
        uses: actions/upload-artifact@v4
        with:
          name: SwitchU-sysmodule-${{ matrix.mode }}
          if-no-files-found: error
          path: artifacts/SwitchU-sysmodule-${{ matrix.mode }}.zip